<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Surprise For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --night:#061311;
  --emerald:#19d88f;
  --teal:#53fff0;
  --mint:#d8fff4;
  --pearl:#f7fffc;
  --gold:#e8c46f;
  --soft:#c8eee5;
  --glass:rgba(255,255,255,.1);
}

body{
  min-height:100vh;
  overflow:hidden;
  cursor:none;
  font-family:'Poppins',sans-serif;
  color:var(--pearl);
  background:
    radial-gradient(circle at 18% 14%, rgba(25,216,143,.28), transparent 32%),
    radial-gradient(circle at 82% 20%, rgba(83,255,240,.18), transparent 30%),
    radial-gradient(circle at 50% 90%, rgba(232,196,111,.16), transparent 38%),
    linear-gradient(135deg,#04100e,#0a211d 48%,#061311);
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(circle at center, black, transparent 82%);
}

body:after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.08) 42%, transparent 56%);
  animation:scanGlow 8s ease-in-out infinite;
}

@keyframes scanGlow{
  0%{
    transform:translateX(-90%) skewX(-16deg);
    opacity:0;
  }

  35%{
    opacity:.35;
  }

  100%{
    transform:translateX(90%) skewX(-16deg);
    opacity:0;
  }
}

.container{
  min-height:100vh;
  width:min(92vw,920px);
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:2;
  padding:34px 0;
}

.container:before{
  content:"";
  position:absolute;
  width:min(620px,86vw);
  aspect-ratio:1;
  border-radius:50%;
  border:1px solid rgba(83,255,240,.16);
  box-shadow:
    0 0 90px rgba(25,216,143,.16),
    inset 0 0 70px rgba(83,255,240,.05);
  animation:orbitSpin 18s linear infinite;
}

.container:after{
  content:"";
  position:absolute;
  width:min(460px,70vw);
  aspect-ratio:1;
  border-radius:50%;
  border:1px dashed rgba(232,196,111,.2);
  animation:orbitSpinReverse 14s linear infinite;
}

@keyframes orbitSpin{
  to{
    transform:rotate(360deg);
  }
}

@keyframes orbitSpinReverse{
  to{
    transform:rotate(-360deg);
  }
}

.card{
  width:min(100%,620px);
  position:relative;
  z-index:3;
  padding:54px clamp(24px,6vw,58px);
  text-align:center;
  border-radius:34px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.13), rgba(255,255,255,.055)),
    radial-gradient(circle at top left, rgba(25,216,143,.22), transparent 44%);
  border:1px solid rgba(255,255,255,.16);
  backdrop-filter:blur(24px);
  box-shadow:
    0 34px 90px rgba(0,0,0,.34),
    0 0 90px rgba(25,216,143,.16);
  overflow:hidden;
  animation:cardIn .9s ease both;
}

@keyframes cardIn{
  from{
    opacity:0;
    transform:translateY(24px) scale(.97);
  }

  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.card:before{
  content:"";
  position:absolute;
  inset:18px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.08);
  pointer-events:none;
}

.card:after{
  content:"";
  position:absolute;
  top:0;
  left:-65%;
  width:52%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.13), transparent);
  transform:skewX(-15deg);
  animation:cardShine 7s ease-in-out infinite;
}

@keyframes cardShine{
  0%,25%{
    left:-65%;
  }

  70%,100%{
    left:120%;
  }
}

h1{
  position:relative;
  z-index:1;
  font-family:'Playfair Display',serif;
  font-size:clamp(2.4rem,6vw,4.4rem);
  line-height:1.05;
  color:white;
  margin-bottom:22px;
  text-shadow:
    0 0 22px rgba(25,216,143,.42),
    0 0 70px rgba(83,255,240,.18);
}

.card p{
  position:relative;
  z-index:1;
  color:var(--soft);
  font-size:17px;
  line-height:1.75;
  margin-bottom:16px;
}

.hint{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin:2px auto 26px;
  padding:9px 16px;
  border-radius:999px;
  color:var(--gold);
  font-size:14px;
  font-weight:600;
  background:rgba(232,196,111,.1);
  border:1px solid rgba(232,196,111,.22);
}

input{
  position:relative;
  z-index:1;
  width:100%;
  margin:0 0 18px;
  padding:17px 20px;
  border:none;
  outline:none;
  border-radius:18px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.17);
  color:white;
  font-size:16px;
  text-align:center;
  letter-spacing:1px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    0 0 24px rgba(83,255,240,.08);
}

input::placeholder{
  color:rgba(216,255,244,.55);
}

input:focus{
  border-color:rgba(83,255,240,.55);
  box-shadow:
    0 0 0 4px rgba(83,255,240,.09),
    0 0 32px rgba(25,216,143,.16);
}

button{
  position:relative;
  z-index:1;
  width:100%;
  padding:17px 28px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,var(--emerald),var(--teal) 58%,var(--gold));
  color:#04100e;
  font-size:16px;
  font-weight:800;
  cursor:none;
  overflow:hidden;
  box-shadow:
    0 18px 44px rgba(25,216,143,.28),
    0 0 58px rgba(83,255,240,.14);
  transition:transform .25s ease, box-shadow .25s ease;
}

button:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
  transform:translateX(-100%);
  transition:transform .55s ease;
}

button:hover{
  transform:translateY(-3px) scale(1.01);
  box-shadow:
    0 25px 62px rgba(25,216,143,.36),
    0 0 86px rgba(83,255,240,.22);
}

button:hover:before{
  transform:translateX(100%);
}

#message{
  min-height:28px;
  margin-top:18px;
  margin-bottom:0;
  color:var(--gold);
  font-weight:600;
}

.float{
  position:fixed;
  bottom:-40px;
  pointer-events:none;
  z-index:1;
  opacity:.76;
  animation:rise linear infinite;
  filter:
    drop-shadow(0 0 10px rgba(25,216,143,.5))
    drop-shadow(0 0 18px rgba(83,255,240,.18));
}

@keyframes rise{
  0%{
    transform:translateY(0) rotate(0deg) scale(.82);
    opacity:0;
  }

  12%{
    opacity:.76;
  }

  100%{
    transform:translateY(-115vh) rotate(34deg) scale(1.18);
    opacity:0;
  }
}

.cursor-dot,
.cursor-ring{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}

.cursor-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:white;
  box-shadow:
    0 0 12px rgba(255,255,255,.9),
    0 0 26px rgba(25,216,143,.9),
    0 0 44px rgba(83,255,240,.55);
}

.cursor-ring{
  width:42px;
  height:42px;
  border:1px solid rgba(83,255,240,.72);
  border-radius:50%;
  box-shadow:
    0 0 30px rgba(25,216,143,.28),
    inset 0 0 22px rgba(232,196,111,.08);
  transition:
    width .2s ease,
    height .2s ease,
    border-color .2s ease,
    opacity .2s ease;
}

.cursor-ring.active{
  width:66px;
  height:66px;
  border-color:rgba(232,196,111,.85);
  opacity:.95;
}

.trail{
  position:fixed;
  pointer-events:none;
  z-index:9998;
  color:white;
  font-size:14px;
  animation:trailFade .85s ease-out forwards;
  text-shadow:
    0 0 12px rgba(25,216,143,.9),
    0 0 24px rgba(83,255,240,.55);
}

@keyframes trailFade{
  0%{
    transform:translate(-50%,-50%) scale(.35) rotate(0deg);
    opacity:1;
  }

  100%{
    transform:translate(-50%,-96%) scale(1.65) rotate(50deg);
    opacity:0;
  }
}

@media(max-width:620px){
  body{
    cursor:auto;
  }

  .cursor-dot,
  .cursor-ring{
    display:none;
  }

  .card{
    border-radius:26px;
    padding:42px 22px;
  }

  button{
    cursor:pointer;
  }

  h1{
    font-size:2.45rem;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <h1>✨ A Special Surprise Awaits You ✨</h1>

    <p>
      Enter the password to unlock your birthday journey ❤️
    </p>

    <p class="hint">
      Hint: Your DOB 🎂❤️
    </p>

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <button onclick="checkPassword()">
      Unlock Surprise ❤️
    </button>

    <p id="message"></p>

  </div>

</div>

<script>
const floatIcons = ["✨","💚","🫧","🌙","💎","✦","🌷"];

for(let i = 0; i < 54; i++){
  const item = document.createElement("div");
  item.className = "float";
  item.innerHTML = floatIcons[Math.floor(Math.random() * floatIcons.length)];
  item.style.left = Math.random() * 100 + "%";
  item.style.animationDuration = 10 + Math.random() * 12 + "s";
  item.style.animationDelay = Math.random() * 8 + "s";
  item.style.fontSize = 14 + Math.random() * 18 + "px";
  document.body.appendChild(item);
}

const cursorDot = document.createElement("div");
cursorDot.className = "cursor-dot";

const cursorRing = document.createElement("div");
cursorRing.className = "cursor-ring";

document.body.appendChild(cursorRing);
document.body.appendChild(cursorDot);

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let ringX = mouseX;
let ringY = mouseY;
let lastTrail = 0;

document.addEventListener("mousemove", function(e){
  mouseX = e.clientX;
  mouseY = e.clientY;

  cursorDot.style.left = mouseX + "px";
  cursorDot.style.top = mouseY + "px";

  const now = Date.now();

  if(now - lastTrail > 42){
    createTrail(mouseX, mouseY);
    lastTrail = now;
  }
});

document.querySelectorAll("button, input").forEach(function(element){
  element.addEventListener("mouseenter", function(){
    cursorRing.classList.add("active");
  });

  element.addEventListener("mouseleave", function(){
    cursorRing.classList.remove("active");
  });
});

function animateCursor(){
  ringX += (mouseX - ringX) * .14;
  ringY += (mouseY - ringY) * .14;

  cursorRing.style.left = ringX + "px";
  cursorRing.style.top = ringY + "px";

  requestAnimationFrame(animateCursor);
}

animateCursor();

function createTrail(x, y){
  const trail = document.createElement("div");
  trail.className = "trail";
  trail.innerHTML = Math.random() > .5 ? "✦" : "✨";

  trail.style.left = x + (Math.random() * 28 - 14) + "px";
  trail.style.top = y + (Math.random() * 28 - 14) + "px";
  trail.style.fontSize = 9 + Math.random() * 12 + "px";

  document.body.appendChild(trail);

  setTimeout(function(){
    trail.remove();
  }, 900);
}
</script>

<script src="script.js"></script>

</body>
</html>
