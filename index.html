<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise For You ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">

            <h1>✨ A Special Surprise Awaits You ✨</h1>

            <p>
                Enter the password to unlock your birthday journey ❤️
            </p>

            <p class="hint">
                Hint: Your DOB 🎂❤️
            </p>

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

            <button onclick="checkPassword()">
                Unlock Surprise ❤️
            </button>

            <p id="message"></p>

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
